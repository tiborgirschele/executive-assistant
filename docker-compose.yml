services:
  ea-api:
    build:
      context: .
      dockerfile: ea/Dockerfile
    image: ea-rewrite:latest
    container_name: ea-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - EA_ROLE=api
      - EA_PORT=8090
      - TZ=Europe/Vienna
    ports:
      - "${EA_HOST_PORT:-8090}:8090"
    volumes:
      - ./config:/config:ro
    depends_on:
      ea-db:
        condition: service_healthy

  ea-db:
    image: postgres:16-alpine
    container_name: ea-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ea_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ea_pgdata: {}
