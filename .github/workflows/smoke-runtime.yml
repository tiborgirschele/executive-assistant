name: Smoke Runtime

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke-runtime-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt pytest httpx

      - name: Run CI Gate Bundle
        run: |
          make ci-gates

  smoke-runtime-postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Postgres Smoke Script
        run: |
          bash scripts/smoke_postgres.sh

  smoke-runtime-postgres-legacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Legacy Migration Regression Smoke
        run: |
          bash scripts/smoke_postgres.sh --legacy-fixture

  postgres-runtime-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ea/requirements.txt pytest httpx

      - name: Run Postgres Repository Contract Tests
        run: |
          bash scripts/test_postgres_contracts.sh
