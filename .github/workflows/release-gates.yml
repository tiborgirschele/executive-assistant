name: Release Gates

on:
  push:
  pull_request:

jobs:
  milestone-smokes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run milestone host smokes
        run: |
          python3 tests/smoke_python_compile_tree.py
          python3 tests/smoke_v1_12_6.py
          python3 tests/smoke_v1_12_7_contract_freeze.py
          python3 tests/smoke_v1_13.py
          python3 tests/smoke_v1_13_future_intelligence_pack.py
          python3 tests/smoke_v1_14.py
          python3 tests/smoke_v1_15.py
          python3 tests/smoke_v1_16.py
          python3 tests/smoke_v1_17.py
          python3 tests/smoke_v1_18.py
          python3 tests/smoke_v1_19_future_intelligence_pack.py
          python3 tests/smoke_v1_19_1_future_intelligence_expansion.py
          python3 tests/smoke_v1_19_1_profile_persistence.py
          python3 tests/smoke_v1_19_1_llm_gateway_boundary.py
          python3 tests/smoke_v1_19_2_human_assistant_mode.py
          python3 tests/smoke_v1_19_2_health_dossier.py
          python3 tests/smoke_v1_19_2_household_dossier.py
          python3 tests/smoke_v1_19_2_snapshot_persistence.py
          python3 tests/smoke_v1_19_2_llm_egress_policy.py
          python3 tests/smoke_v1_19_2_missingness.py
          python3 tests/smoke_v1_19_3_human_compose_behavior.py
          python3 tests/smoke_v1_19_3_skill_router.py
          python3 tests/smoke_v1_19_4_capability_registry.py
          python3 tests/smoke_v1_19_4_skill_inventory.py
          python3 tests/smoke_v1_19_4_capability_router.py
          python3 tests/smoke_v1_19_4_doc_alignment.py
          python3 tests/smoke_v1_19_4_backlog_contract.py
          python3 tests/smoke_v1_19_4_skill_runtime_path.py
          python3 tests/smoke_v1_19_4_sidecar_skill_orchestration.py
          python3 tests/smoke_v1_19_4_llm_gateway_convergence.py
          python3 tests/smoke_v1_19_4_briefing_diagnostics_log_gate.py
          python3 tests/smoke_v1_19_4_ltd_inventory_doc.py
          python3 tests/smoke_v1_19_4_event_worker_role_alignment.py
          python3 tests/smoke_v1_20_execution_sessions.py
          python3 tests/smoke_v1_20_doc_alignment.py
          python3 tests/smoke_v1_20_typed_action_sessions.py
          python3 tests/smoke_v1_20_browseract_event_sessions.py
          python3 tests/smoke_v1_20_external_event_sessions.py
          python3 tests/smoke_v1_20_external_event_behavior.py
          python3 tests/smoke_v1_20_slash_command_sessions.py
          python3 tests/smoke_v1_20_teable_memory_boundary.py
          python3 tests/smoke_v1_20_slash_command_behavior.py
          python3 tests/smoke_v1_20_typed_action_behavior.py
          python3 tests/smoke_v1_20_typed_action_approval_resume.py
          python3 tests/smoke_v1_20_free_text_approval_gate_behavior.py
          python3 tests/smoke_v1_20_gog_session_id_uniqueness.py
          python3 tests/smoke_v1_20_legacy_button_action_sessions.py
          python3 tests/smoke_v1_20_brief_command_sessions.py
          python3 tests/smoke_v1_21_task_contract_registry.py
          python3 tests/smoke_v1_21_intent_spec_v2_shape.py
          python3 tests/smoke_v1_21_provider_broker.py
          python3 tests/smoke_v1_21_provider_registry.py
          python3 tests/smoke_v1_21_generic_skill_execution.py
          python3 tests/smoke_v1_21_plan_builder.py
          python3 tests/smoke_v1_21_gate_alias.py
          python3 tests/smoke_v1_21_doc_alignment.py
          python3 tests/smoke_v1_19_3_control_plane_decomposition.py
          python3 tests/smoke_v1_19_3_source_acquisition_split.py
          python3 tests/smoke_v1_19_3_briefing_runtime_behavior.py
          python3 tests/smoke_v1_18_1_runtime_alignment.py
          python3 tests/smoke_newspaper_issue_pipeline.py
          python3 tests/smoke_newspaper_brief_wiring.py
          python3 tests/smoke_newspaper_pdf_gate_wiring.py
          python3 tests/smoke_telegram_payload_sanitized.py

  docker-e2e:
    runs-on: ubuntu-latest
    needs: milestone-smokes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI env
        run: |
          cat > .env <<'EOF'
          TZ=Europe/Vienna
          EA_HOST_PORT=8090
          POSTGRES_DB=ea
          POSTGRES_PASSWORD=secure_db_pass_2026
          EA_DB_PASSWORD=secure_db_pass_2026
          EA_INGEST_TOKEN=ci_ingest_token
          EA_OPERATOR_TOKEN=ci_operator_token
          TELEGRAM_BOT_TOKEN=PUT_YOUR_TELEGRAM_BOT_TOKEN_HERE
          EOF

      - name: Run Docker E2E gates
        run: bash scripts/docker_e2e.sh

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reports
          path: logs/gates/*.json
          if-no-files-found: warn
